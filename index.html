<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Invidious FE</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" data-link aria-label="Invidious FE home">
          <span class="brand-mark">IV</span>
          <span class="brand-text">Invidious FE</span>
        </a>

        <form class="search-form" id="global-search" role="search">
          <input id="global-search-input" name="q" type="search" autocomplete="off" placeholder="Search videos, channels, playlists">
          <button type="submit" aria-label="Search">
            <span aria-hidden="true">⌕</span>
          </button>
        </form>

        <nav class="top-nav" aria-label="Primary">
          <a href="/feed/trending" data-link>Trending</a>
          <a href="/feed/popular" data-link>Popular</a>
          <a href="/account" data-link>Account</a>
          <a href="/settings" data-link>Settings</a>
        </nav>
      </header>

      <main id="view" class="view" tabindex="-1"></main>
    </div>

    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
